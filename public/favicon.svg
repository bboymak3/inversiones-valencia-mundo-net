<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="favGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="favLens" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="64" height="64" rx="14" fill="#FFFFFF"/>
  <rect width="64" height="64" rx="14" fill="url(#favGrad)" opacity="0.08"/>

  <!-- Camera body -->
  <rect x="12" y="20" width="40" height="26" rx="4" fill="url(#favGrad)"/>
  <rect x="12" y="20" width="40" height="26" rx="4" fill="none" stroke="#1B5E20" stroke-width="0.8"/>

  <!-- Mount bracket -->
  <rect x="26" y="14" width="12" height="7" rx="1.5" fill="#6B7280"/>
  <rect x="31" y="10" width="2" height="5" fill="#6B7280"/>

  <!-- Lens outer ring -->
  <circle cx="32" cy="33" r="9" fill="#1B1F23"/>
  <circle cx="32" cy="33" r="7.5" fill="url(#favLens)"/>

  <!-- Lens inner -->
  <circle cx="32" cy="33" r="5" fill="#0A0E12"/>
  <circle cx="32" cy="33" r="3.2" fill="#1B5E20" opacity="0.85"/>

  <!-- Lens reflection -->
  <circle cx="29.5" cy="30.5" r="1.3" fill="#A5D6A7" opacity="0.95"/>

  <!-- LED indicator -->
  <circle cx="46" cy="26" r="1.2" fill="#7CFF8B"/>
</svg>
