# ============================================================
# Wrangler configuration — Inversiones Valencia Mundo Net
# Cloudflare Pages + D1 + R2
# ============================================================

name = "inversiones-valencia-mundo-net"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

# ------------------------------------------------------------
# Pages Configuration
# El build se hace con @cloudflare/next-on-pages
# Output: .vercel/output/static
# ------------------------------------------------------------
pages_build_output_dir = ".vercel/output/static"

# ------------------------------------------------------------
# D1 Database (existente)
# ID: 38dd85ba-03dc-4937-af19-4d1c41a18f27
# Las tablas usan prefijo `ivmn_` para no chocar con tablas existentes.
# ------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "inversiones-valencia-mundo-net"
database_id = "38dd85ba-03dc-4937-af19-4d1c41a18f27"

# ------------------------------------------------------------
# R2 Bucket — imágenes de productos
# Carpeta: inversiones-valencia/products/ para no chocar con otros proyectos
# ------------------------------------------------------------
[[r2_buckets]]
binding = "PRODUCTS_BUCKET"
bucket_name = "ivmn-products"

# ------------------------------------------------------------
# Variables de entorno públicas (también configurar en dashboard)
# ------------------------------------------------------------
[vars]
WHATSAPP_NUMBER = "584169726126"
WHATSAPP_DISPLAY = "+58 416-9726126"
SITE_NAME = "Inversiones Valencia Mundo Net"
SITE_URL = "https://inversionesvalencia.pages.dev"
NEXT_PUBLIC_SITE_URL = "https://inversionesvalencia.pages.dev"
NEXT_PUBLIC_WHATSAPP_NUMBER = "584169726126"

# ------------------------------------------------------------
# Build command para Cloudflare Pages (dashboard)
# Framework preset: Next.js
# Build command: npx @cloudflare/next-on-pages
# Build output directory: .vercel/output/static
# ------------------------------------------------------------
